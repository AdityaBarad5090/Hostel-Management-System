<!DOCTYPE html>
<html>

<head>
    <title>Student Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            color: white;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h2 {
            font-weight: bold;
        }

        .icon {
            font-size: 30px;
            opacity: 0.8;
        }

        .text-dark-card {
            color: #212529 !important;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">👤 Student</h4>

                <a href="/student/dashboard" class="active"> <i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/student/profile"> <i class="bi bi-person"></i> Profile</a>
                <a href="/student/room"> <i class="bi bi-door-open"></i> Room</a>
                <a href="/student/fees"> <i class="bi bi-cash"></i> Fees</a>

                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h3 class="mb-4">📊 Welcome, <span id="studentName"></span></h3>

                <div class="row g-4">

                    <!-- Profile -->
                    <div class="col-md-4">
                        <div class="card bg-primary shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Profile</h6>
                                    <h2 id="name"></h2>
                                </div>
                                <i class="bi bi-person icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Room -->
                    <div class="col-md-4">
                        <div class="card bg-success shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Room</h6>
                                    <h2 id="room"></h2>
                                </div>
                                <i class="bi bi-door-open icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Fees -->
                    <div class="col-md-4">
                        <div class="card bg-warning text-dark shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Fees Status</h6>
                                    <h2 id="fees"></h2>
                                </div>
                                <i class="bi bi-cash icon"></i>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        const student = JSON.parse(localStorage.getItem("student"));

        // Redirect if not logged in
        if (!student) {
            window.location.href = "/student/login";
        }

        // Fill dashboard data
        document.getElementById("studentName").innerText = student.name;
        document.getElementById("name").innerText = student.name;
        document.getElementById("room").innerText = student.room_id || "Not Assigned";
        document.getElementById("fees").innerText = "Loading...";

        fetch(`/fees/get-fee/${student.id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("fees").innerText = data.status || "Pending";
            })
            .catch(() => {
                document.getElementById("fees").innerText = "Unavailable";
            });

        // Logout
        function logout() {
            localStorage.removeItem("student");
            window.location.href = "/";
        }
    </script>

</body>

</html>

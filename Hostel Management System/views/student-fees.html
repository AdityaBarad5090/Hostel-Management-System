<!DOCTYPE html>
<html>

<head>
    <title>My Fees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background: #f1f5f9; }
        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }
        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: #0d6efd;
            color: white;
        }
        .card {
            border: none;
            border-radius: 15px;
            padding: 25px;
            background: white;
        }
        .status-badge {
            font-size: 16px;
            padding: 8px 20px;
            border-radius: 50px;
        }
    </style>
</head>

<body>
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="mb-4">👤 Student</h4>
            <a href="/student/dashboard"> <i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/student/profile"> <i class="bi bi-person"></i> Profile</a>
            <a href="/student/room"> <i class="bi bi-door-open"></i> Room</a>
            <a href="/student/fees" class="active"> <i class="bi bi-cash"></i> Fees</a>
            <hr>
            <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <h3 class="mb-4">💰 My Fees</h3>

            <div class="row g-4">

                <!-- Fee Details Card -->
                <div class="col-md-5">
                    <div class="card shadow h-100">
                        <h5 class="mb-4">📋 Fee Details</h5>

                        <div class="mb-3">
                            <small class="text-muted">Student Name</small>
                            <h5 id="feeName">Loading...</h5>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted">Room Number</small>
                            <h5 id="feeRoom">Loading...</h5>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted">Fee Amount</small>
                            <h3 class="text-primary" id="feeAmount">Loading...</h3>
                        </div>

                        <div class="mb-4">
                            <small class="text-muted d-block mb-2">Payment Status</small>
                            <span class="status-badge badge" id="statusBadge">Loading...</span>
                        </div>

                        <button class="btn btn-success w-100" onclick="downloadReceipt()">
                            <i class="bi bi-download"></i> Download Receipt
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const student = JSON.parse(localStorage.getItem("student"));

    if (!student) {
        window.location.href = "/student/login";
    }

    let feeData = null;

    // Fetch Fee Details
    fetch(`/fees/get-fee/${student.id}`)
        .then(res => res.json())
        .then(data => {
            feeData = data;

            // Fee Details Card
            document.getElementById("feeName").innerText = student.name;
            document.getElementById("feeRoom").innerText = student.room_id || "Not Assigned";
            document.getElementById("feeAmount").innerText = "₹" + data.fee || "N/A";

            // Payment Status Badge
            const badge = document.getElementById("statusBadge");
            if (data.status === "Paid") {
                badge.innerText = "✅ Paid";
                badge.classList.add("bg-success");
            } else {
                badge.innerText = "⏳ Pending";
                badge.classList.add("bg-warning", "text-dark");
            }

            // Payment History Table
    
        })
        .catch(() => {
            document.getElementById("feeName").innerText = "Error loading data";
        });

    // Download Receipt as PDF
    function downloadReceipt() {
        if (!feeData) {
            alert("Fee data not loaded yet!");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(20);
        doc.text("Hostel Fee Receipt", 70, 20);

        doc.setFontSize(12);
        doc.text("--------------------------------------------", 10, 30);
        doc.text(`Student Name : ${student.name}`, 10, 45);
        doc.text(`Room         : ${student.room_id || "Not Assigned"}`, 10, 55);
        doc.text(`Amount       : Rs. ${feeData.fee}`, 10, 65);
        doc.text(`Status       : ${feeData.status}`, 10, 75);
        doc.text("--------------------------------------------", 10, 85);
        doc.text("Thank you!", 10, 95);

        doc.save(`receipt_${student.name}.pdf`);
    }

    function logout() {
        localStorage.removeItem("student");
        window.location.href = "/";
    }
</script>

</body>
</html>

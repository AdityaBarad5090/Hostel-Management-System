<!DOCTYPE html>
<html>

<head>
    <title>Fee Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            color: #cbd5e1;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a.active,
        .sidebar a:hover {
            background: #0d6efd;
            color: white;
        }

        .sidebar h4 {
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
        }

        .badge-paid {
            background: #22c55e;
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        .badge-unpaid {
            background: #ef4444;
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 13px;
        }

        /* Info banner */
        .info-banner {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 10px 16px;
            color: #1d4ed8;
            font-size: 14px;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">🏠 Hostel</h4>
                <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/students"><i class="bi bi-people"></i> Students</a>
                <a href="/admin/rooms"><i class="bi bi-door-open"></i> Rooms</a>
                <a href="/admin/fees" class="active"><i class="bi bi-cash"></i> Fees</a>
                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Content -->
            <div class="col-md-10 p-4">
                <div class="card shadow p-3">

                    <!-- Top Bar -->
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">💰 Fee List</h5>
                    </div>

                    <!-- Info Banner -->
                    <div class="info-banner">
                        <i class="bi bi-info-circle me-1"></i>
                        Fees are automatically created when a student is added. You can only update the payment status below.
                    </div>

                    <!-- Table -->
                    <table id="feeTable" class="table table-hover text-center align-middle" style="margin-top: 10px;">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Student</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                    </table>

                </div>
            </div>

        </div>
    </div>

    <!-- Mark as Paid / Unpaid Modal -->
    <div class="modal fade" id="statusModal">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Update Payment Status</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p class="mb-1 text-muted" style="font-size:14px">Student</p>
                    <p id="modal-student-name" class="fw-bold mb-3"></p>

                    <p class="mb-1 text-muted" style="font-size:14px">Amount</p>
                    <p id="modal-amount" class="fw-bold mb-3"></p>

                    <p class="mb-1 text-muted" style="font-size:14px">Current Status</p>
                    <p id="modal-current-status" class="mb-3"></p>

                    <label class="form-label fw-semibold">Change Status To</label>
                    <select id="new-status" class="form-select">
                        <option value="Paid">✅ Paid</option>
                        <option value="Unpaid">❌ Unpaid</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="saveStatus()">Update</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let table;
        let currentEditId = null;

        // Load Fee Table
        function loadFees() {
            if ($.fn.DataTable.isDataTable('#feeTable')) {
                $('#feeTable').DataTable().destroy();
            }

            table = $('#feeTable').DataTable({
                ajax: {
                    url: "http://localhost:3000/fees/all",
                    dataSrc: ""
                },
                columns: [
                    { data: "id" },
                    { data: "name" },
                    {
                        data: "amount",
                        render: data => `₹ ${data}`
                    },
                    {
                        data: "status",
                        render: data => data === "Paid"
                            ? '<span class="badge-paid">Paid</span>'
                            : '<span class="badge-unpaid">Unpaid</span>'
                    },
                    {
                        data: null,
                        render: data => `
                            <button class="btn btn-warning btn-sm"
                                onclick="openStatusModal(${data.id}, '${data.name}', ${data.amount}, '${data.status}')">
                                <i class="bi bi-pencil-square"></i> Update Status
                            </button>
                        `
                    }
                ]
            });
        }

        // Open status modal (only action admin can do)
        function openStatusModal(id, name, amount, status) {
            currentEditId = id;
            document.getElementById('modal-student-name').textContent = name;
            document.getElementById('modal-amount').textContent = `₹ ${amount}`;
            document.getElementById('modal-current-status').innerHTML = status === 'Paid'
                ? '<span class="badge-paid">Paid</span>'
                : '<span class="badge-unpaid">Unpaid</span>';
            document.getElementById('new-status').value = status;

            new bootstrap.Modal(document.getElementById('statusModal')).show();
        }

        // Save updated status
        function saveStatus() {
            const status = document.getElementById('new-status').value;

            $.ajax({
                url: `http://localhost:3000/fees/update/${currentEditId}`,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({ status }),
                success: function () {
                    alert("Status updated ✅");
                    const modal = bootstrap.Modal.getInstance(document.getElementById('statusModal'));
                    modal.hide();
                    loadFees();
                },
                error: function () {
                    alert("Failed to update status ❌");
                }
            });
        }

        // Logout
        function logout() {
            alert("Logged out");
            window.location.href = "/";
        }

        // Init
        loadFees();
    </script>

</body>

</html>

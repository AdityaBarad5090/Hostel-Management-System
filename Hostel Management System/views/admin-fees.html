<!DOCTYPE html>
<html>

<head>
    <title>Fee Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            color: #cbd5e1;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a.active,
        .sidebar a:hover {
            background: #0d6efd;
            color: white;
        }

        .sidebar h4 {
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
        }

        .badge-paid {
            background: #22c55e;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .badge-unpaid {
            background: #ef4444;
            padding: 5px 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">🏠 Hostel</h4>
                <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/students"><i class="bi bi-people"></i> Students</a>
                <a href="/admin/rooms"><i class="bi bi-door-open"></i> Rooms</a>
                <a href="/admin/fees" class="active"><i class="bi bi-cash"></i> Fees</a>
                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Content -->
            <div class="col-md-10 p-4">
                <div class="card shadow p-3">
                    <!-- Top Bar -->
                    <div class="d-flex justify-content-between mb-3">
                        <h5>💰 Fee List</h5>
                        
                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#feeModal">
                            <i class="bi bi-plus-circle"></i> Add Fee
                        </button>
                    </div>

                    <!-- Table -->
                    <table id="feeTable" class="table table-hover text-center align-middle" style="margin-top: 45px;">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Student</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                    </table>

                </div>

            </div>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="feeModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add / Edit Fee</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="number" id="student_id" class="form-control mb-3" placeholder="Student ID"
                        onkeyup="getFee()">

                    <input type="text" id="name" class="form-control mb-3" placeholder="Student Name" readonly>

                    <input type="number" id="amount" class="form-control mb-3" placeholder="Amount" readonly>

                    <select id="status" class="form-control">
                        <option value="Paid">Paid</option>
                        <option value="Unpaid">Unpaid</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="saveFee()">Save</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let table;
        let editId = null;

        // Load DataTable
        function loadFees() {
            table = $('#feeTable').DataTable({
                destroy: true,
                ajax: {
                    url: "http://localhost:3000/fees/all",
                    dataSrc: ""
                },
                columns: [
                    { data: "id" },
                    { data: "name" },
                    {
                        data: "amount",
                        render: data => `₹ ${data}`
                    },
                    {
                        data: "status",
                        render: data => data === "Paid"
                            ? '<span class="badge-paid">Paid</span>'
                            : '<span class="badge-unpaid">Unpaid</span>'
                    },
                    {
                        data: null,
                        render: data => `
                    <button class="btn btn-warning btn-sm me-1"
                        onclick="editFee(${data.id}, ${data.student_id}, ${data.amount}, '${data.status}')">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-danger btn-sm"
                        onclick="deleteFee(${data.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                `
                    }
                ]
            });
        }

        // Save Fee
        function saveFee() {
            const student_id = $("#student_id").val();
            const amount = $("#amount").val();
            const status = $("#status").val();

            if (!student_id || !amount) {
                alert("Enter valid data");
                return;
            }

            const url = editId
                ? `http://localhost:3000/fees/update/${editId}`
                : "http://localhost:3000/fees/add";

            const method = editId ? "PUT" : "POST";

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify({ student_id, amount, status }),
                success: function () {
                    alert(editId ? "Updated ✅" : "Added ✅");
                    editId = null;
                    loadFees();
                    clearForm();

                    const modal = bootstrap.Modal.getInstance(document.getElementById('feeModal'));
                    modal.hide();
                }
            });
        }

        // Delete
        function deleteFee(id) {
            if (confirm("Delete fee?")) {
                $.ajax({
                    url: `http://localhost:3000/fees/delete/${id}`,
                    type: "DELETE",
                    success: function () {
                        loadFees();
                    }
                });
            }
        }

        // Edit
        function editFee(id, student_id, amount, status) {
            $("#student_id").val(student_id);
            $("#amount").val(amount);
            $("#status").val(status);
            editId = id;

            new bootstrap.Modal(document.getElementById('feeModal')).show();
        }

        // Auto Fetch
        function getFee() {
            const student_id = $("#student_id").val();

            if (!student_id) return;

            $.get(`http://localhost:3000/fees/get-fee/${student_id}`, function (data) {
                $("#name").val(data.name);
                $("#amount").val(data.fee);
            });
        }

        // Clear
        function clearForm() {
            $("#student_id").val("");
            $("#name").val("");
            $("#amount").val("");
            $("#status").val("Paid");
        }

        // Logout
        function logout() {
            alert("Logged out");
            window.location.href = "/";
        }

        // Init
        loadFees();
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hostel Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            color: #cbd5e1;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }

        .sidebar h4 {
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">🏠 Hostel</h4>

                <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/students" class="active"><i class="bi bi-people"></i> Students</a>
                <a href="/admin/rooms"><i class="bi bi-door-open"></i> Rooms</a>
                <a href="/admin/fees"><i class="bi bi-cash"></i> Fees</a>

                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Content -->
            <div class="col-md-10 p-4">

                <div class="card shadow p-3">

                    <!-- Top Bar -->
                    <div class="d-flex justify-content-between mb-3">
                        <h5><i class="bi bi-table"></i> Student List</h5>

                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">
                            <i class="bi bi-plus-circle"></i> Add Student
                        </button>
                    </div>

                    <!-- Table -->
                    <table id="studentTable" class="table table-hover text-center align-middle "
                        style="margin-top: 45px;">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Room</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                </div>

            </div>

        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">➕ Add Student</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="addName" class="form-control mb-3" placeholder="Student Name">
                    <input type="email" id="addEmail" class="form-control mb-3" placeholder="Student Email">
                    <input type="password" id="addPassword" class="form-control mb-3" placeholder="Password">
                    <input type="text" id="addPhone" class="form-control mb-3" placeholder="Phone Number">
                    <input type="number" id="addRoomId" class="form-control mb-3" placeholder="Room ID">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-success" onclick="addStudent()">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">✏️ Edit Student</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="editName" class="form-control mb-3" placeholder="Student Name">
                    <input type="email" id="editEmail" class="form-control mb-3" placeholder="Student Email">
                    <input type="text" id="editPhone" class="form-control mb-3" placeholder="Phone Number">
                    <input type="number" id="editRoomId" class="form-control mb-3" placeholder="Room ID">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-warning" onclick="updateStudent()">Update</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let editId = null;

        // Load Students
        function loadStudents() {
            $.get("/students/all", function (data) {

                if ($.fn.DataTable.isDataTable('#studentTable')) {
                    $('#studentTable').DataTable().destroy();
                }

                $("#studentTable tbody").empty();

                data.forEach(student => {
                    $("#studentTable tbody").append(`
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.email || "N/A"}</td>
                        <td>${student.phone}</td>
                        <td>${student.room_id || "N/A"}</td>
                        <td>
                            <button class="btn btn-warning btn-sm me-1"
                                onclick="openEditModal(${student.id}, '${student.name}', '${student.email}', '${student.phone}', ${student.room_id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-danger btn-sm"
                                onclick="deleteStudent(${student.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `);
                });

                $('#studentTable').DataTable();
            });
        }

        // Add Student
        function addStudent() {
            const name = $("#addName").val().trim();
            const email = $("#addEmail").val().trim();
            const password = $("#addPassword").val().trim();
            const phone = $("#addPhone").val().trim();
            const room_id = $("#addRoomId").val().trim();

            // ✅ Added room_id in validation
            if (!name || !password || !phone || !room_id) {
                alert("Fill all required fields including Room ID!");
                return;
            }

            $.ajax({
                url: "/students/add",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({ name, email, password, phone, room_id }),
                success: function (response) {
                    if (response.includes("FULL")) {
                        alert("❌ Room is Full! Please choose another room.");
                        return;
                    }
                    alert("Student Added ✅");
                    loadStudents();
                    $("#addName, #addEmail, #addPassword, #addPhone, #addRoomId").val("");
                    bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
                },
                error: function (err) {
                    alert("Something went wrong! " + err.responseText);
                }
            });
        }
        // Open Edit Modal
        function openEditModal(id, name, email, phone, room_id) {
            editId = id;
            $("#editName").val(name);
            $("#editEmail").val(email);
            $("#editPhone").val(phone);
            $("#editRoomId").val(room_id);
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // Update Student
        function updateStudent() {
            const name = $("#editName").val().trim();
            const email = $("#editEmail").val().trim();
            const phone = $("#editPhone").val().trim();
            const room_id = $("#editRoomId").val().trim();

            if (!name || !phone) {
                alert("Fill all required fields!");
                return;
            }

            $.ajax({
                url: `/students/update/${editId}`,
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify({ name, email, phone, room_id }),
                success: function () {
                    alert("Student Updated ✅");
                    editId = null;
                    loadStudents();
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                }
            });
        }

        // Delete Student
        function deleteStudent(id) {
            if (confirm("Delete this student?")) {
                $.ajax({
                    url: `/students/delete/${id}`,
                    type: "DELETE",
                    success: function () {
                        loadStudents();
                    }
                });
            }
        }

        // Logout
        function logout() {
            alert("Logged out");
            window.location.href = "/";
        }

        loadStudents();
    </script>

</body>

</html>

<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
        }
        .logo-circle {
            width: 72px;
            height: 72px;
            background: rgba(37, 99, 235, 0.2);
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 28px;
            color: #93c5fd;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.75rem;
        }
        .input-group-custom {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 0 14px;
            transition: border 0.2s;
        }
        .input-group-custom:focus-within {
            border-color: rgba(37, 99, 235, 0.5);
        }
        .input-group-custom i {
            color: #64748b;
            font-size: 16px;
            flex-shrink: 0;
        }
        .input-group-custom input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 10px;
            width: 100%;
            font-size: 14px;
        }
        .input-group-custom input::placeholder {
            color: #475569;
        }
        .form-label-custom {
            color: #94a3b8;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
        }
        .btn-login {
            background: #2563eb;
            border: none;
            border-radius: 10px;
            color: white;
            padding: 13px;
            font-size: 15px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .btn-login:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>
<div class="login-wrapper">

    <div class="text-center mb-4">
        <div class="logo-circle">
            <i class="bi bi-mortarboard"></i>
        </div>
        <h4 class="text-white mb-1">Student Login</h4>
        <p style="color: #64748b; font-size: 14px;">Sign in to access your hostel portal</p>
    </div>

    <div class="glass-card">

        <div class="mb-3">
            <label class="form-label-custom">Email</label>
            <div class="input-group-custom">
                <i class="bi bi-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="off">
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label-custom">Password</label>
            <div class="input-group-custom">
                <i class="bi bi-lock"></i>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
        </div>

        <button class="btn-login" onclick="login()">
            <i class="bi bi-box-arrow-in-right me-2"></i> Login
        </button>

        <p class="text-center mt-3 mb-0">
            <a href="/" style="color: #475569; font-size: 13px; text-decoration: none;">
                &#8592; Back to home
            </a>
        </p>

    </div>

</div>

<script>
function login() {
    const email = $("#email").val();
    const password = $("#password").val();

    if (!email || !password) {
        alert("All fields are required!");
        return;
    }

    $.ajax({
        url: "/auth/student-login",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({ email, password }),
        success: function(res) {
            if (res.success) {
                localStorage.setItem("student", JSON.stringify(res.student));
                alert(res.message);
                window.location.href = "/student/dashboard";
            } else {
                alert(res.message);
            }
        },
        error: function() {
            alert("Server error ❌");
        }
    });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Hostel System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .logo-circle {
            width: 72px;
            height: 72px;
            background: #2563eb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .login-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            text-decoration: none;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .login-btn:last-child { margin-bottom: 0; }
        .btn-admin {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.3);
        }
        .btn-admin:hover {
            background: rgba(220, 38, 38, 0.25);
        }
        .btn-student {
            background: rgba(37, 99, 235, 0.15);
            border: 1px solid rgba(37, 99, 235, 0.3);
        }
        .btn-student:hover {
            background: rgba(37, 99, 235, 0.25);
        }
        .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }
        .icon-admin { background: rgba(220,38,38,0.2); color: #fca5a5; }
        .icon-student { background: rgba(37,99,235,0.2); color: #93c5fd; }
        .btn-title-admin { color: #fca5a5; font-weight: 600; margin: 0; font-size: 15px; }
        .btn-title-student { color: #93c5fd; font-weight: 600; margin: 0; font-size: 15px; }
        .btn-sub { font-size: 12px; margin: 0; opacity: 0.6; }
        .btn-sub-admin { color: #fca5a5; }
        .btn-sub-student { color: #93c5fd; }
        .chevron { margin-left: auto; opacity: 0.5; font-size: 16px; }
        .chevron-admin { color: #fca5a5; }
        .chevron-student { color: #93c5fd; }
    </style>
</head>

<body>
<div class="login-wrapper">

    <div class="text-center mb-4">
        <div class="logo-circle">
            <i class="bi bi-building text-white" style="font-size: 30px;"></i>
        </div>
        <h4 class="text-white mb-1">Hostel Management</h4>
        <p class="text-secondary" style="font-size: 14px;">Select your login type to continue</p>
    </div>

    <div class="glass-card">

        <a href="/admin/login" class="login-btn btn-admin">
            <div class="btn-icon icon-admin">
                <i class="bi bi-person-workspace"></i>
            </div>
            <div>
                <p class="btn-title-admin">Admin Login</p>
                <p class="btn-sub btn-sub-admin">Manage students, rooms & fees</p>
            </div>
            <i class="bi bi-chevron-right chevron chevron-admin"></i>
        </a>

        <a href="/student/login" class="login-btn btn-student">
            <div class="btn-icon icon-student">
                <i class="bi bi-mortarboard"></i>
            </div>
            <div>
                <p class="btn-title-student">Student Login</p>
                <p class="btn-sub btn-sub-student">View room, fees & profile</p>
            </div>
            <i class="bi bi-chevron-right chevron chevron-student"></i>
        </a>

    </div>

    <!-- <p class="text-center mt-3" style="color: #475569; font-size: 12px;">
        Hostel Management System &copy; 2024
    </p> -->

</div>
</body>
</html>

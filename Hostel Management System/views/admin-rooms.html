<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Room Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: flex;
            color: #cbd5e1;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }

        .sidebar h4 {
            font-weight: bold;
        }

        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">🏠 Hostel</h4>

                <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/students"><i class="bi bi-people"></i> Students</a>
                <a href="/admin/rooms" class="active"><i class="bi bi-door-open"></i> Rooms</a>
                <a href="/admin/fees"><i class="bi bi-cash"></i> Fees</a>

                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Content -->
            <div class="col-md-10 p-4">

                <div class="card shadow p-3">

                    <!-- Top Bar -->
                    <div class="d-flex justify-content-between mb-3">
                        <h5>🚪 Room List</h5>

                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#roomModal">
                            <i class="bi bi-plus-circle"></i> Add Room
                        </button>
                    </div>

                    <!-- Table -->
                    <table id="roomTable" class="table table-hover text-center align-middle" style="margin-top: 45px;">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Room</th>
                                <th>Capacity</th>
                                <th>Fee</th>
                                <th>Occupied</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>

                </div>

            </div>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="roomModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Add / Edit Room</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" id="room_number" class="form-control mb-3" placeholder="Room Number">
                    <input type="number" id="capacity" class="form-control mb-3" placeholder="Capacity">
                    <input type="number" id="fee" class="form-control mb-3" placeholder="Room Fee">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button class="btn btn-success" onclick="saveRoom()">Save</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let table;
        let editId = null;

        // Load Rooms
        function loadRooms() {
            $.get("http://localhost:3000/rooms/all", function (data) {

                if ($.fn.DataTable.isDataTable('#roomTable')) {
                    $('#roomTable').DataTable().destroy();
                }

                $("#roomTable tbody").empty();

                data.forEach(room => {

                    let status = room.occupied < room.capacity
                        ? '<span class="badge bg-success">Available</span>'
                        : '<span class="badge bg-danger">Full</span>';

                    $("#roomTable tbody").append(`
                <tr>
                    <td>${room.id}</td>
                    <td>${room.room_number}</td>
                    <td>${room.capacity}</td>
                    <td>₹ ${room.fee}</td>
                    <td>${room.occupied}</td>
                    <td>${status}</td>
                    <td>
                        <button class="btn btn-warning btn-sm me-1"
                            onclick="editRoom(${room.id}, '${room.room_number}', ${room.capacity}, ${room.fee})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="deleteRoom(${room.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `);
                });

                table = $('#roomTable').DataTable();
            });
        }

        // Save Room
        function saveRoom() {
            const room_number = $("#room_number").val();
            const capacity = $("#capacity").val();
            const fee = $("#fee").val();

            if (!room_number || !capacity || !fee) {
                alert("Fill all fields");
                return;
            }

            const url = editId
                ? `http://localhost:3000/rooms/update/${editId}`
                : "http://localhost:3000/rooms/add";

            const method = editId ? "PUT" : "POST";

            $.ajax({
                url: url,
                type: method,
                contentType: "application/json",
                data: JSON.stringify({ room_number, capacity, fee }),
                success: function () {
                    alert(editId ? "Updated ✅" : "Added ✅");
                    editId = null;
                    loadRooms();
                    clearForm();

                    const modal = bootstrap.Modal.getInstance(document.getElementById('roomModal'));
                    modal.hide();
                }
            });
        }

        // Delete
        function deleteRoom(id) {
            if (confirm("Delete this room?")) {
                $.ajax({
                    url: `http://localhost:3000/rooms/delete/${id}`,
                    type: "DELETE",
                    success: function () {
                        loadRooms();
                    }
                });
            }
        }

        // Edit
        function editRoom(id, room_number, capacity, fee) {
            $("#room_number").val(room_number);
            $("#capacity").val(capacity);
            $("#fee").val(fee);
            editId = id;

            new bootstrap.Modal(document.getElementById('roomModal')).show();
        }

        // Clear form
        function clearForm() {
            $("#room_number").val("");
            $("#capacity").val("");
            $("#fee").val("");
        }

        // Logout
        function logout() {
            alert("Logged out");
            window.location.href = "/";
        }

        loadRooms();
    </script>

</body>

</html>

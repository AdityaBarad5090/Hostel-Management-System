<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background: #f1f5f9;
        }

        /* Sidebar */
        .sidebar {
            min-height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
        }

        .sidebar h4 {
            font-weight: bold;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e1;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #0d6efd;
            color: white;
        }

        /* Cards */
        .card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            color: white;
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h2 {
            font-weight: bold;
        }

        .icon {
            font-size: 30px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="mb-4">🏠 Hostel</h4>
                <a href="/admin/dashboard" class="active"> <i class="bi bi-speedometer2"></i> Dashboard</a>
                <a href="/admin/students"> <i class="bi bi-people"></i> Students</a>
                <a href="/admin/rooms"> <i class="bi bi-door-open"></i> Rooms</a>
                <a href="/admin/fees"> <i class="bi bi-cash"></i> Fees </a>
                <hr>
                <button class="btn btn-danger w-100 mt-3" onclick="logout()">Logout</button>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 p-4">
                <h3 class="mb-4">📊 Dashboard</h3>

                <div class="row g-4">
                    <!-- Students -->
                    <div class="col-md-4">
                        <div class="card bg-primary shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Total Students</h6>
                                    <h2 id="students">0</h2>
                                </div>
                                <i class="bi bi-people icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Rooms -->
                    <div class="col-md-4">
                        <div class="card bg-success shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Total Rooms</h6>
                                    <h2 id="rooms">0</h2>
                                </div>
                                <i class="bi bi-door-open icon"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Available -->
                    <div class="col-md-4">
                        <div class="card bg-warning text-dark shadow">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6>Available Rooms</h6>
                                    <h2 id="available">0</h2>
                                </div>
                                <i class="bi bi-check-circle icon"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        function loadDashboard() {
            $.get("http://localhost:3000/dashboard", function (data) {
                $("#students").text(data.totalStudents);
                $("#rooms").text(data.totalRooms);
                $("#available").text(data.availableRooms);
            });
        }

        function logout() {
            alert("Logged out ✅");
            window.location.href = "/";
        }

        loadDashboard();
    </script>
</body>
</html>
